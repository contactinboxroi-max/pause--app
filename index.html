<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pause</title>

<!-- iPhone App Mode -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pause">
<meta name="theme-color" content="#050505">

<!-- App Icon -->
<link rel="apple-touch-icon" href="icon.png">

<style>
body {
  margin: 0;
  background: rgb(5,5,5);
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  height: 100vh;
  overflow: hidden;
  user-select: none;
  touch-action: none;
  overscroll-behavior: none;
  transition: background 0.3s ease;
}

.app {
  width: 100%;
  height: 100%;
  transform-origin: center;
  transition: transform 0.2s ease;
}

#message {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  font-size: 2rem;
  max-width: 85%;
  line-height: 1.3;
  opacity: 0.95;
  transition: opacity 0.3s ease;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.overlay.active {
  opacity: 1;
}

.pulse {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  transform: translate(-50%, -50%) scale(var(--scale));
  pointer-events: none;
  animation: expand 0.75s ease-out forwards;
}

@keyframes expand {
  from {
    width: var(--size);
    height: var(--size);
    opacity: 0.6;
  }
  to {
    width: calc(var(--size) * 2.2);
    height: calc(var(--size) * 2.2);
    opacity: 0;
  }
}

.flash {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,var(--strength));
  pointer-events: none;
  animation: flash var(--duration) ease-out;
}

@keyframes flash {
  from { opacity: 1; }
  to { opacity: 0; }
}
</style>
</head>

<body>

<div class="app" id="app">
  <div id="message"></div>
</div>

<div class="overlay" id="overlay"></div>

<script>
// -------------------- MESSAGES --------------------

const normalMessages = [
  "nothing has happened yet",
  "you haven’t acted yet",
  "you’re still here"
];

const stayMessages = [
  "stay with the feeling",
  "let it pass",
  "no need to act",
  "this will pass if you don’t act",
  "you’re already doing it",
  "just a few more seconds",
  "this is enough",
  "don’t rush"
];

let last = "";

// -------------------- STATE --------------------

let energy = 0;
let releasing = false;
let stayMode = false;

let touching = false;

let realX = null;
let realY = null;
let targetX = null;
let targetY = null;

let prevX = null;
let prevY = null;
let smoothSpeed = 0;

let recoil = 0;
let peakSpeed = 0;
let buildFrames = 0;

let cooldown = 0;

// -------------------- DOM --------------------

const app = document.getElementById("app");
const messageEl = document.getElementById("message");
const overlay = document.getElementById("overlay");

// -------------------- MESSAGE --------------------

function pick(arr) {
  let m = last;
  while (m === last) {
    m = arr[Math.floor(Math.random() * arr.length)];
  }
  last = m;
  return m;
}

function showMessage(type="normal") {
  messageEl.textContent =
    type === "stay" ? pick(stayMessages) : pick(normalMessages);
}

// -------------------- VIBRATION --------------------

function vibrate(pattern = [10]) {
  if (navigator.vibrate) {
    navigator.vibrate(pattern);
  }
}

// -------------------- VISUAL --------------------

function createPulse(x, y, size = 20, scale = 1) {
  const p = document.createElement("div");
  p.className = "pulse";
  p.style.left = x + "px";
  p.style.top = y + "px";
  p.style.setProperty('--size', size + 'px');
  p.style.setProperty('--scale', scale);
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 750);
}

// -------------------- ENERGY --------------------

function updateEnergy(speed) {
  if (releasing) return;

  smoothSpeed = smoothSpeed * 0.8 + speed * 0.2;

  peakSpeed = Math.max(peakSpeed, smoothSpeed);
  buildFrames++;

  const normalized = Math.min(smoothSpeed / 30, 1);
  let force = Math.pow(normalized, 1.5);

  if (cooldown > 0) force *= (1 - cooldown);
  if (stayMode) force *= 0.15;

  energy += force * 2;

  if (energy > 100) {
    releasing = true;
    recoil = 1;
    triggerRelease();
  }
}

// -------------------- RELEASE --------------------

function triggerRelease() {
  const f = document.createElement("div");
  f.className = "flash";
  f.style.setProperty('--strength', 0.08);
  f.style.setProperty('--duration', "250ms");
  document.body.appendChild(f);
  setTimeout(() => f.remove(), 250);

  // 🔥 vibration here
  vibrate([10, 20, 10]);

  overlay.classList.add("active");

  stayMode = true;
  showMessage("stay");

  cooldown = 1;
  peakSpeed = 0;
  buildFrames = 0;

  setTimeout(() => {
    stayMode = false;
    overlay.classList.remove("active");
    showMessage("normal");
  }, 3000);
}

// -------------------- DECAY --------------------

function decayEnergy() {
  if (releasing) {
    energy *= 0.88;
    if (energy < 5) {
      energy = 0;
      releasing = false;
    }
  } else {
    energy *= 0.985;
  }

  cooldown *= 0.92;

  const base = 5 + energy * 0.9;
  document.body.style.background = `rgb(${base},${base},${base})`;

  const resistance = 1 - Math.max(0, energy - 40) * 0.0008;

  recoil *= 0.85;

  const stayScale = stayMode ? 0.98 : 1;

  app.style.transform =
    `scale(${(resistance + recoil * 0.015) * stayScale})`;

  requestAnimationFrame(decayEnergy);
}
decayEnergy();

// -------------------- DRAW --------------------

function draw(x, y, speed) {
  const intensity = 0.6 + Math.min(speed / 25, 2);

  const size = 14 + intensity * 16;
  const scale = 1 + intensity * 0.2;

  createPulse(x, y, size, scale);
  updateEnergy(speed);
}

// -------------------- LOOP --------------------

function loop() {
  if (touching && targetX !== null) {
    const dragFactor = stayMode ? 0.08 : 0.2;

    realX += (targetX - realX) * dragFactor;
    realY += (targetY - realY) * dragFactor;

    if (prevX !== null) {
      const dx = realX - prevX;
      const dy = realY - prevY;
      const speed = Math.hypot(dx, dy);

      draw(realX, realY, speed);
    }

    prevX = realX;
    prevY = realY;
  }

  requestAnimationFrame(loop);
}
loop();

// -------------------- INPUT --------------------

function start(x, y) {
  touching = true;
  targetX = realX = x;
  targetY = realY = y;

  prevX = x;
  prevY = y;

  createPulse(x, y, 18);
}

function move(x, y) {
  if (!touching) return;
  targetX = x;
  targetY = y;
}

function end() {
  touching = false;
  targetX = null;
  targetY = null;
  prevX = null;
  prevY = null;
  smoothSpeed = 0;
}

// mouse
document.addEventListener("mousedown", e => start(e.clientX, e.clientY));
document.addEventListener("mousemove", e => move(e.clientX, e.clientY));
document.addEventListener("mouseup", end);

// touch
document.addEventListener("touchstart", e => {
  const t = e.touches[0];
  start(t.clientX, t.clientY);
}, { passive: false });

document.addEventListener("touchmove", e => {
  const t = e.touches[0];
  move(t.clientX, t.clientY);
}, { passive: false });

document.addEventListener("touchend", end);

// init
showMessage();
</script>

</body>
</html>
