<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pause</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#050505">

<style>
body{
  margin:0;
  background:#050505;
  color:white;
  font-family:-apple-system,sans-serif;
  height:100vh;
  overflow:hidden;
  touch-action:none;
}

#message{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:2rem;
  text-align:center;
}

.flash{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,0.12);
  animation:flash 200ms forwards;
}
@keyframes flash{
  from{opacity:1;}
  to{opacity:0;}
}
</style>
</head>

<body>

<div id="message">you’re still here</div>

<script>

// -------- STATE --------

let energy = 0;
let active = false;
let lastRelease = 0;

// -------- SETTINGS (simple + stable) --------

const BUILD_RATE = 0.6;      // how fast it builds
const DECAY = 0.98;         // natural drop
const THRESHOLD = 100;      // peak point
const COOLDOWN = 800;       // ms between peaks

// -------- RELEASE --------

function release(){
  lastRelease = Date.now();
  energy = 0;

  const f=document.createElement("div");
  f.className="flash";
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),200);

  message.textContent = "stay";

  setTimeout(()=>{
    message.textContent = "you’re still here";
  },1000);
}

// -------- LOOP --------

function loop(){

  if(active){
    energy += BUILD_RATE;
  }

  energy *= DECAY;

  if(
    energy > THRESHOLD &&
    Date.now() - lastRelease > COOLDOWN
  ){
    release();
  }

  requestAnimationFrame(loop);
}
loop();

// -------- INPUT --------

document.addEventListener("pointerdown",()=>{
  active = true;
});

document.addEventListener("pointerup",()=>{
  active = false;
});

</script>

</body>
</html>
