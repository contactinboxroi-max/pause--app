<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pause</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pause">
<meta name="theme-color" content="#050505">

<link rel="apple-touch-icon" href="icon.png">

<style>
body {
  margin: 0;
  background: #050505;
  color: white;
  font-family: -apple-system, sans-serif;
  height: 100vh;
  overflow: hidden;
  touch-action: none;
}

#message {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 2rem;
  text-align: center;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  opacity: 0;
  transition: opacity 0.25s;
}
.overlay.active { opacity: 1; }

.pulse {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  transform: translate(-50%, -50%);
  animation: expand 0.6s forwards;
}
@keyframes expand {
  from { width:10px; height:10px; opacity:0.6; }
  to { width:60px; height:60px; opacity:0; }
}

.flash {
  position: fixed;
  inset:0;
  background: rgba(255,255,255,0.1);
  animation: flash 200ms forwards;
}
@keyframes flash {
  from { opacity:1; }
  to { opacity:0; }
}
</style>
</head>

<body>

<div id="message"></div>
<div class="overlay" id="overlay"></div>

<script>
// ---------------- STATE ----------------

let energy = 0;
let momentum = 0;
let smoothSpeed = 0;

let lastReleaseTime = 0; // 🔥 replaces "releasing"

// ---------------- DOM ----------------

const messageEl = document.getElementById("message");
const overlay = document.getElementById("overlay");

// ---------------- MESSAGE ----------------

const normal = ["you’re still here","nothing happened yet"];
const stay = ["stay with it","let it pass"];

function setMessage(arr){
  messageEl.textContent = arr[Math.floor(Math.random()*arr.length)];
}

// ---------------- VIBRATE ----------------

function vibrate(p=[10]){
  if(navigator.vibrate) navigator.vibrate(p);
}

// ---------------- VISUAL ----------------

function pulse(x,y){
  const p = document.createElement("div");
  p.className="pulse";
  p.style.left=x+"px";
  p.style.top=y+"px";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),600);
}

// ---------------- ENERGY ----------------

function updateEnergy(speed){
  const now = Date.now();

  smoothSpeed = smoothSpeed*0.7 + speed*0.3;
  momentum = momentum*0.9 + smoothSpeed*0.6;

  const normalized = Math.min(momentum/20,1);

  let gain = Math.pow(normalized,1.1) + 0.02;

  energy += gain*3;

  // 🔥 only block PEAK, not buildup
  if(energy > 70 && now - lastReleaseTime > 1500){
    triggerRelease();
  }
}

// ---------------- RELEASE ----------------

function triggerRelease(){
  lastReleaseTime = Date.now(); // 🔥 key

  energy = 0;
  momentum = 0;

  const f=document.createElement("div");
  f.className="flash";
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),200);

  vibrate([10,20,10]);

  overlay.classList.add("active");
  setMessage(stay);

  setTimeout(()=>{
    overlay.classList.remove("active");
    setMessage(normal);
  },2000);
}

// ---------------- INPUT ----------------

let touching=false;
let x=0,y=0,px=0,py=0;

function start(nx,ny){
  touching=true;
  x=px=nx;
  y=py=ny;
}

function move(nx,ny){
  if(!touching) return;

  x += (nx-x)*0.25;
  y += (ny-y)*0.25;

  const dx=x-px;
  const dy=y-py;
  const speed=Math.hypot(dx,dy);

  pulse(x,y);
  updateEnergy(speed);

  px=x; py=y;
}

function end(){
  touching=false;
}

// mouse
document.addEventListener("mousedown",e=>start(e.clientX,e.clientY));
document.addEventListener("mousemove",e=>move(e.clientX,e.clientY));
document.addEventListener("mouseup",end);

// touch
document.addEventListener("touchstart",e=>{
  const t=e.touches[0];
  start(t.clientX,t.clientY);
},{passive:false});

document.addEventListener("touchmove",e=>{
  const t=e.touches[0];
  move(t.clientX,t.clientY);
},{passive:false});

document.addEventListener("touchend",end);

// init
setMessage(normal);
</script>

</body>
</html>
