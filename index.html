<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pause</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pause">
<meta name="theme-color" content="#050505">

<link rel="apple-touch-icon" href="icon.png">

<style>
body {
  margin: 0;
  background: #050505;
  color: white;
  font-family: -apple-system, sans-serif;
  height: 100vh;
  overflow: hidden;
  touch-action: none; /* 🔥 IMPORTANT */
}

#message {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 2rem;
  text-align: center;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  opacity: 0;
  transition: opacity 0.25s;
}
.overlay.active { opacity: 1; }

.pulse {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  transform: translate(-50%, -50%);
  animation: expand 0.6s forwards;
}
@keyframes expand {
  from { width:12px; height:12px; opacity:0.6; }
  to { width:70px; height:70px; opacity:0; }
}

.flash {
  position: fixed;
  inset:0;
  background: rgba(255,255,255,0.1);
  animation: flash 180ms forwards;
}
@keyframes flash {
  from { opacity:1; }
  to { opacity:0; }
}
</style>
</head>

<body>

<div id="message"></div>
<div class="overlay" id="overlay"></div>

<script>
// ---------------- STATE ----------------

let energy = 0;
let momentum = 0;
let smoothSpeed = 0;

let lastRelease = 0;

let active = false;

let targetX = 0, targetY = 0;
let realX = 0, realY = 0;
let prevX = 0, prevY = 0;

// ---------------- DOM ----------------

const messageEl = document.getElementById("message");
const overlay = document.getElementById("overlay");

// ---------------- MESSAGE ----------------

const normal = ["you’re still here","nothing happened yet"];
const stay = ["stay with it","let it pass"];

function setMessage(arr){
  messageEl.textContent = arr[Math.floor(Math.random()*arr.length)];
}

// ---------------- VIBRATION ----------------

function vibrate(p=[10]){
  if(navigator.vibrate) navigator.vibrate(p);
}

// ---------------- VISUAL ----------------

function pulse(x,y){
  const p=document.createElement("div");
  p.className="pulse";
  p.style.left=x+"px";
  p.style.top=y+"px";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),600);
}

// ---------------- ENERGY ----------------

function updateEnergy(speed){
  smoothSpeed = smoothSpeed*0.75 + speed*0.25;
  momentum = momentum*0.9 + smoothSpeed*0.5;

  const norm = Math.min(momentum/18,1);

  let gain = Math.pow(norm,1.05) + 0.02;

  energy += gain*2.8;

  if(energy > 65 && Date.now() - lastRelease > 1200){
    triggerRelease();
  }
}

// ---------------- RELEASE ----------------

function triggerRelease(){
  lastRelease = Date.now();

  energy = 10;
  momentum *= 0.3;

  const f=document.createElement("div");
  f.className="flash";
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),180);

  vibrate([10,20,10]);

  overlay.classList.add("active");
  setMessage(stay);

  setTimeout(()=>{
    overlay.classList.remove("active");
    setMessage(normal);
  },1800);
}

// ---------------- LOOP ----------------

function loop(){
  if(active){
    realX += (targetX - realX)*0.25;
    realY += (targetY - realY)*0.25;

    const dx = realX - prevX;
    const dy = realY - prevY;
    const speed = Math.hypot(dx,dy);

    if(speed > 0.05){
      pulse(realX,realY);
      updateEnergy(speed);
    }

    prevX = realX;
    prevY = realY;
  }

  requestAnimationFrame(loop);
}
loop();

// ---------------- POINTER EVENTS (🔥 FIX) ----------------

document.addEventListener("pointerdown", e => {
  active = true;

  targetX = realX = prevX = e.clientX;
  targetY = realY = prevY = e.clientY;

  smoothSpeed = 0;

  // 🔥 capture pointer (prevents drop)
  e.target.setPointerCapture(e.pointerId);
});

document.addEventListener("pointermove", e => {
  if(!active) return;

  targetX = e.clientX;
  targetY = e.clientY;
});

document.addEventListener("pointerup", e => {
  active = false;

  try { e.target.releasePointerCapture(e.pointerId); } catch(e){}
});

// init
setMessage(normal);
</script>

</body>
</html>
