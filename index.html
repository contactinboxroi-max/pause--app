<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pause</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pause">
<meta name="theme-color" content="#050505">

<style>
body {
  margin: 0;
  background: rgb(5,5,5);
  color: white;
  font-family: -apple-system, sans-serif;
  height: 100vh;
  overflow: hidden;
  touch-action: none;
  transition: background 0.3s ease;
}

.app {
  width: 100%;
  height: 100%;
  transform-origin: center;
  transition: transform 0.2s ease;
}

#message {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 2rem;
  text-align: center;
  max-width: 85%;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  opacity: 0;
  transition: opacity 0.3s ease;
}
.overlay.active { opacity:1; }

.pulse {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  transform: translate(-50%, -50%) scale(var(--scale));
  animation: expand 0.75s ease-out forwards;
}

@keyframes expand {
  from { width: var(--size); height: var(--size); opacity: 0.6; }
  to { width: calc(var(--size)*2.2); height: calc(var(--size)*2.2); opacity: 0; }
}

.flash {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.1);
  animation: flash 220ms ease-out;
}

@keyframes flash {
  from { opacity:1; }
  to { opacity:0; }
}
</style>
</head>

<body>

<div class="app" id="app">
  <div id="message"></div>
</div>

<div class="overlay" id="overlay"></div>

<script>

// -------------------- MESSAGES --------------------

const normalMessages = [
  "nothing has happened yet",
  "you haven’t acted yet",
  "you’re still here"
];

const stayMessages = [
  "stay with the feeling",
  "let it pass",
  "no need to act",
  "this will pass if you don’t act",
  "you’re already doing it",
  "just a few more seconds",
  "this is enough",
  "don’t rush"
];

let last = "";

// -------------------- STATE --------------------

let energy = 0;
let releasing = false;
let stayMode = false;

let touching = false;

let realX = null;
let realY = null;
let targetX = null;
let targetY = null;

let prevX = null;
let prevY = null;

let smoothSpeed = 0;
let momentum = 0;

let recoil = 0;
let cooldown = 0;

let lastReleaseTime = 0;

// -------------------- DOM --------------------

const app = document.getElementById("app");
const messageEl = document.getElementById("message");
const overlay = document.getElementById("overlay");

// -------------------- MESSAGE --------------------

function pick(arr) {
  let m = last;
  while (m === last) {
    m = arr[Math.floor(Math.random() * arr.length)];
  }
  last = m;
  return m;
}

function showMessage(type="normal") {
  messageEl.textContent =
    type === "stay" ? pick(stayMessages) : pick(normalMessages);
}

// -------------------- VISUAL --------------------

function createPulse(x, y, size, scale) {
  const p = document.createElement("div");
  p.className = "pulse";
  p.style.left = x + "px";
  p.style.top = y + "px";
  p.style.setProperty('--size', size + 'px');
  p.style.setProperty('--scale', scale);
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 700);
}

// -------------------- ENERGY --------------------

function updateEnergy(speed) {
  if (releasing) return;

  smoothSpeed = smoothSpeed * 0.75 + speed * 0.25;
  momentum = momentum * 0.9 + smoothSpeed * 0.5;

  const normalized = Math.min(momentum / 25, 1);
  let force = Math.pow(normalized, 1.1);

  if (cooldown > 0) force *= (1 - cooldown);
  if (stayMode) force *= 0.2;

  // 🔥 refined peak tuning (kept)
  if (energy > 70) force *= 1.04;
  if (energy > 72) force *= 0.92;

  energy += force * 3;

  if (
    energy > 75 &&
    !releasing &&
    Date.now() - lastReleaseTime > 1000
  ) {
    releasing = true;
    lastReleaseTime = Date.now();
    recoil = 1;
    triggerRelease();
  }
}

// -------------------- RELEASE --------------------

function triggerRelease() {
  const f = document.createElement("div");
  f.className = "flash";
  document.body.appendChild(f);
  setTimeout(() => f.remove(), 220);

  overlay.classList.add("active");

  stayMode = true;
  showMessage("stay");

  cooldown = 1;
  momentum = 0;
  energy = 0;

  setTimeout(() => {
    stayMode = false;
    releasing = false;
    overlay.classList.remove("active");
    showMessage("normal");
  }, 2800);
}

// -------------------- LOOP --------------------

function loop() {
  if (touching && targetX !== null) {

    // 🔥 restored slow/drag feeling
    const drag = stayMode ? 0.09 : 0.22;

    realX += (targetX - realX) * drag;
    realY += (targetY - realY) * drag;

    if (prevX !== null) {
      const dx = realX - prevX;
      const dy = realY - prevY;
      const speed = Math.hypot(dx, dy);

      createPulse(
        realX,
        realY,
        10 + Math.min(speed * 1.5, 40),
        1 + speed * 0.03
      );

      updateEnergy(speed);
    }

    prevX = realX;
    prevY = realY;
  }

  energy *= stayMode ? 0.96 : 0.985;
  cooldown *= 0.92;

  const base = 5 + energy * 1.2;
  document.body.style.background = `rgb(${base},${base},${base})`;

  const resistance = 1 - Math.max(0, energy - 40) * 0.0008;
  recoil *= 0.85;

  app.style.transform =
    `scale(${resistance + recoil * 0.02})`;

  requestAnimationFrame(loop);
}
loop();

// -------------------- INPUT --------------------

function start(x, y) {
  touching = true;
  targetX = realX = x;
  targetY = realY = y;
  prevX = x;
  prevY = y;
}

function move(x, y) {
  if (!touching) return;
  targetX = x;
  targetY = y;
}

function end() {
  touching = false;
  targetX = null;
  targetY = null;
  prevX = null;
  prevY = null;
  smoothSpeed = 0;
}

document.addEventListener("pointerdown", e => start(e.clientX, e.clientY));
document.addEventListener("pointermove", e => move(e.clientX, e.clientY));
document.addEventListener("pointerup", end);

// init
showMessage();

</script>

</body>
</html>
